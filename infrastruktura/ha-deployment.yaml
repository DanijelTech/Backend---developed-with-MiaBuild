# ==============================================================================
# HA Deployment za NexGen
# ==============================================================================
# @author MIA BUILD
# @version 1.0.0
# @date 2024-12-24
# @domain Zaledni sistemi
#
# @compliance DO-178C, IEC-61508, ISO-26262, MIL-STD-882E
# @meta_atom REL_003 - High Availability
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: NexGen
  namespace: NexGen
  labels:
    app: NexGen
    version: "1.0.0"
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: NexGen
  template:
    metadata:
      labels:
        app: NexGen
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - NexGen
                topologyKey: kubernetes.io/hostname
      containers:
        - name: NexGen
          image: NexGen:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1001

---
apiVersion: v1
kind: Service
metadata:
  name: NexGen
  namespace: NexGen
  labels:
    app: NexGen
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: NexGen

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: NexGen-pdb
  namespace: NexGen
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: NexGen

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: NexGen-hpa
  namespace: NexGen
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: NexGen
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
